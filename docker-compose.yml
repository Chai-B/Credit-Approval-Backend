services:
  db:
    image: postgres:15-alpine
    container_name: credit_db
    environment:
      POSTGRES_DB: ${DB_NAME:-credit_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: credit_redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: credit_web
    command: >
      sh -c "python manage.py makemigrations core &&
             python manage.py migrate &&
             python manage.py shell -c 'from core.views import ingest; ingest.delay()' &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports: ["8000:8000"]
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DB_NAME=${DB_NAME:-credit_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    container_name: credit_celery
    command: celery -A core worker -l info --concurrency 2
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DB_NAME=${DB_NAME:-credit_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
